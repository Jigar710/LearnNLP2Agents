<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="Learn NLP to Agents">
  <defs>
    <linearGradient id="g" x1="0" y1="16" x2="32" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#0D9488"/>
      <stop offset="0.5"  stop-color="#7C3AED"/>
      <stop offset="1"    stop-color="#EA580C"/>
    </linearGradient>
  </defs>

  <!-- Transparent background; gradient monogram "N→A" -->
  <text x="16" y="16" text-anchor="middle" dominant-baseline="central"
        font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif"
        font-weight="800" font-size="15" letter-spacing="-0.5"
        fill="url(#g)">N→A</text>
</svg>
